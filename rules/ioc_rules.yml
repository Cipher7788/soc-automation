rules:
  - id: "IOC-001"
    name: "Known Malicious IP Detected"
    description: "Traffic from or to a known malicious IP address"
    severity: "high"
    logic: "AND"
    conditions:
      - field: "source_ip"
        operator: "exists"
    tags:
      - "ioc"
      - "ip"
      - "threat-intel"

  - id: "IOC-002"
    name: "Tor Exit Node Communication"
    description: "Host communicating with known Tor exit nodes"
    severity: "medium"
    logic: "OR"
    conditions:
      - field: "rule_description"
        operator: "contains"
        value: "tor"
      - field: "rule_description"
        operator: "contains"
        value: "anonymizer"
    tags:
      - "tor"
      - "anonymization"

  - id: "IOC-003"
    name: "Suspicious Domain in DNS Query"
    description: "DNS query to a domain flagged in threat intelligence"
    severity: "high"
    logic: "AND"
    conditions:
      - field: "event_type"
        operator: "contains"
        value: "dns"
      - field: "rule_description"
        operator: "exists"
    tags:
      - "dns"
      - "domain"
      - "c2"

  - id: "IOC-004"
    name: "Malware Hash Execution"
    description: "Known malware hash executed on endpoint"
    severity: "critical"
    logic: "OR"
    conditions:
      - field: "rule_description"
        operator: "contains"
        value: "malware"
      - field: "rule_description"
        operator: "contains"
        value: "trojan"
      - field: "rule_description"
        operator: "contains"
        value: "ransomware"
      - field: "rule_description"
        operator: "contains"
        value: "virus"
    tags:
      - "malware"
      - "hash"
      - "endpoint"

  - id: "IOC-005"
    name: "Port Scanning Activity"
    description: "Sequential port scanning detected from a source IP"
    severity: "medium"
    logic: "OR"
    conditions:
      - field: "rule_description"
        operator: "contains"
        value: "scan"
      - field: "rule_description"
        operator: "contains"
        value: "probe"
    tags:
      - "scanning"
      - "reconnaissance"

  - id: "IOC-006"
    name: "C2 Beacon Pattern"
    description: "Periodic outbound connection matching C2 beacon behaviour"
    severity: "critical"
    logic: "OR"
    conditions:
      - field: "rule_description"
        operator: "contains"
        value: "c2"
      - field: "rule_description"
        operator: "contains"
        value: "command and control"
      - field: "rule_description"
        operator: "contains"
        value: "beacon"
    tags:
      - "c2"
      - "beacon"
      - "malware"
