rules:
  - id: "CORR-001"
    name: "Brute Force Authentication Attack"
    description: "Multiple failed authentication attempts from the same source within a time window"
    severity: "high"
    logic: "OR"
    conditions:
      - field: "rule_description"
        operator: "contains"
        value: "failed login"
      - field: "rule_description"
        operator: "contains"
        value: "authentication failure"
      - field: "rule_description"
        operator: "contains"
        value: "invalid password"
      - field: "rule_description"
        operator: "contains"
        value: "too many failed"
    threshold:
      count: 5
      time_window: 300
    tags:
      - "brute-force"
      - "authentication"

  - id: "CORR-002"
    name: "Lateral Movement — Pass the Hash / Pass the Ticket"
    description: "Credential reuse pattern indicating lateral movement"
    severity: "critical"
    logic: "OR"
    conditions:
      - field: "rule_description"
        operator: "contains"
        value: "pass the hash"
      - field: "rule_description"
        operator: "contains"
        value: "pass the ticket"
      - field: "rule_description"
        operator: "contains"
        value: "lateral movement"
      - field: "rule_description"
        operator: "contains"
        value: "remote login"
    tags:
      - "lateral-movement"
      - "credential-abuse"

  - id: "CORR-003"
    name: "Data Exfiltration — Large Outbound Transfer"
    description: "Unusually large data transfer to an external destination"
    severity: "high"
    logic: "OR"
    conditions:
      - field: "rule_description"
        operator: "contains"
        value: "data exfiltration"
      - field: "rule_description"
        operator: "contains"
        value: "large upload"
      - field: "rule_description"
        operator: "contains"
        value: "suspicious outbound"
    tags:
      - "exfiltration"
      - "data-loss"

  - id: "CORR-004"
    name: "Privilege Escalation Detected"
    description: "Attempt to escalate privileges on an endpoint"
    severity: "critical"
    logic: "OR"
    conditions:
      - field: "rule_description"
        operator: "contains"
        value: "privilege escalation"
      - field: "rule_description"
        operator: "contains"
        value: "sudo"
      - field: "rule_description"
        operator: "contains"
        value: "setuid"
      - field: "rule_description"
        operator: "contains"
        value: "run as"
    tags:
      - "privilege-escalation"
      - "endpoint"

  - id: "CORR-005"
    name: "Rootkit or Kernel Module Detected"
    description: "Indicators of rootkit activity or unauthorized kernel module loading"
    severity: "critical"
    logic: "OR"
    conditions:
      - field: "rule_description"
        operator: "contains"
        value: "rootkit"
      - field: "rule_description"
        operator: "contains"
        value: "kernel module"
      - field: "rule_description"
        operator: "contains"
        value: "hidden process"
    tags:
      - "rootkit"
      - "persistence"

  - id: "CORR-006"
    name: "Suspicious PowerShell Execution"
    description: "PowerShell command with obfuscated or encoded payload"
    severity: "high"
    logic: "OR"
    conditions:
      - field: "rule_description"
        operator: "contains"
        value: "powershell"
      - field: "rule_description"
        operator: "contains"
        value: "encoded command"
      - field: "rule_description"
        operator: "contains"
        value: "invoke-expression"
    tags:
      - "powershell"
      - "lolbas"
      - "windows"

  - id: "CORR-007"
    name: "Web Shell Detected"
    description: "Possible web shell upload or execution on web server"
    severity: "critical"
    logic: "OR"
    conditions:
      - field: "rule_description"
        operator: "contains"
        value: "web shell"
      - field: "rule_description"
        operator: "contains"
        value: "webshell"
      - field: "rule_description"
        operator: "contains"
        value: "php eval"
    tags:
      - "webshell"
      - "web-server"
      - "rce"
