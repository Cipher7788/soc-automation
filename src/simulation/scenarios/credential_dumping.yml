name: credential_dumping
description: "Simulates Mimikatz-style credential dumping from LSASS memory."
mitre_technique: T1003
severity: critical
steps:
  - action: lsass_access
    log_template: "Process accessed: lsass.exe by {process} (PID: 4242) on {hostname} — GrantedAccess: 0x1010"
    expected_detection: credential_dumping
  - action: mimikatz_execution
    log_template: "File created: C:\\Windows\\Temp\\mim.exe hash={hash} by user {username} on {hostname}"
    expected_detection: malware_detected
  - action: sekurlsa_logonpasswords
    log_template: "PowerShell command: Invoke-Mimikatz -Command 'sekurlsa::logonpasswords' on {hostname}"
    expected_detection: credential_dumping
  - action: credential_exfil
    log_template: "Outbound connection from {hostname} ({src_ip}) to {dst_ip}:{port} — 4.2KB data transferred"
    expected_detection: data_exfiltration
  - action: lateral_move
    log_template: "Successful logon: user={username} from {src_ip} via Pass-the-Hash on {hostname}"
    expected_detection: lateral_movement
